name: Build Mod

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: JDK 21 installieren
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Mod bauen
        run: gradle build --no-daemon

      - name: JAR-Datei hochladen
        uses: actions/upload-artifact@v4
        with:
          name: invisibility-glow-jar
          path: build/libs/*.jar
